name: Secret Scan (TruffleHog)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  secret-scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history so TruffleHog can scan all commits in a push/PR
          fetch-depth: 0

      - name: TruffleHog — Scan for secrets
        uses: trufflesecurity/trufflehog-actions-scan@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Report scan result
        if: success()
        run: |
          echo "✅ TruffleHog scan completed — no verified secrets detected."

      - name: Fail on detected secrets
        if: failure()
        run: |
          echo "🚨 CRITICAL: TruffleHog detected potential secrets in this branch!"
          echo ""
          echo "Immediate actions required:"
          echo "  1. DO NOT merge this PR / branch."
          echo "  2. Rotate any exposed credentials immediately."
          echo "  3. Remove the secret from git history using 'git filter-repo'."
          echo "  4. Review the TruffleHog output above for details."
          echo ""
          echo "Reference: https://trufflesecurity.com/blog/how-to-handle-leaked-secrets"
          exit 1
